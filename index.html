<!DOCTYPE html>
<html lang="tg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест — Jannat Abdulloeva</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #e05a2b;
      --accent-hover: #c94d20;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --bg: #f5f5f5;
      --white: #ffffff;
      --radius: 6px;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--text);
      text-transform: uppercase;
    }

    .header-avatar-wrap {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    .header-avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      display: block;
    }

    /* PAGE */
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* QUIZ CARD */
    .quiz-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .progress-bar { height: 3px; background: #ebebeb; }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    .q-body { padding: 24px 20px 20px; }

    .q-text {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 22px;
    }

    /* RADIO OPTIONS */
    .options { display: flex; flex-direction: column; }

    .opt-label {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      user-select: none;
      transition: color 0.15s;
    }

    .opt-label:first-child { border-top: none; }
    .opt-label:hover { color: var(--accent); }
    .opt-label input[type="radio"] { display: none; }

    .radio-circle {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s;
      flex-shrink: 0;
    }

    .radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transform: scale(0.3);
      transition: all 0.18s ease;
    }

    .opt-label input[type="radio"]:checked ~ .radio-circle { border-color: var(--accent); }
    .opt-label input[type="radio"]:checked ~ .radio-circle .radio-dot { opacity: 1; transform: scale(1); }

    /* FOOTER */
    .q-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    .q-counter { font-size: 15px; font-weight: 600; color: var(--muted); }

    /* FIRST STEP BOX */
    .step-box {
      background: #fff8f5;
      border: 1.5px solid #f5c9b5;
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 16px;
    }

    .step-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .step-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.6;
    }

    /* INSTAGRAM PROFILE */
    .ig-profile {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .ig-avatar-wrap {
      width: 64px;
      height: 64px;
      min-width: 64px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    .ig-avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      display: block;
    }

    .ig-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .ig-name { font-size: 15px; font-weight: 800; color: var(--text); }
    .ig-bio { font-size: 12px; color: var(--muted); line-height: 1.5; }

    .ig-follow-btn {
      display: inline-block;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      padding: 7px 18px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.18s;
      text-align: center;
    }

    .ig-follow-btn:hover { background: var(--accent-hover); }

    /* SHAKE */
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      25%{ transform:translateX(-8px) }
      75%{ transform:translateX(8px) }
    }

    /* RESULT */
    .result-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .res-top {
      background: var(--accent);
      padding: 32px 24px 28px;
      text-align: center;
    }

    .res-emoji { font-size: 52px; margin-bottom: 12px; line-height: 1; }

    .res-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 10px;
    }

    .res-title {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
    }

    .res-body { padding: 24px 20px 20px; }

    .res-desc {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 22px;
    }

    /* Score row */
    .score-row { display: flex; gap: 8px; margin-bottom: 22px; }

    .score-chip {
      flex: 1;
      background: #f7f7f7;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
    }

    .score-chip.winner { background: #fff2ee; border-color: var(--accent); }

    .chip-letter {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-chip.winner .chip-letter { color: var(--accent); }

    .chip-count { font-size: 30px; font-weight: 800; color: #d0d0d0; }
    .score-chip.winner .chip-count { color: var(--accent); }

    /* Consult */
    .consult-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
      transition: background 0.18s, transform 0.15s;
    }

    .consult-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }

    .consult-icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .consult-text { display: flex; flex-direction: column; gap: 3px; }
    .consult-title { font-size: 15px; font-weight: 800; color: #fff; }
    .consult-sub { font-size: 12px; color: rgba(255,255,255,0.8); }

    .retry-btn {
      width: 100%;
      padding: 13px;
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: var(--radius);
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }

    .retry-btn:hover { border-color: #999; color: var(--text); }

    @media (max-width: 480px) {
      .q-text { font-size: 19px; }
      .res-title { font-size: 21px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-avatar-wrap">
    <img src="jannat.jpg" alt="Jannat">
  </div>
  <span class="brand">Jannat Abdulloeva</span>
</header>

<div class="page">

  <!-- QUIZ -->
  <div class="quiz-card" id="quizCard">
    <div class="progress-bar">
      <div class="progress-fill" id="progFill" style="width:6.67%"></div>
    </div>
    <div class="q-body">
      <div class="q-text" id="qText"></div>
      <div class="options" id="optList"></div>
    </div>
    <div class="q-footer">
      <span class="q-counter" id="qCounter">1 / 15</span>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-card" id="resultCard">
    <div class="res-top">
      <div class="res-emoji" id="resEmoji"></div>
      <div class="res-eyebrow">Бовари пинҳонии ту</div>
      <div class="res-title" id="resTitle"></div>
    </div>
    <div class="res-body">
      <p class="res-desc" id="resDesc"></p>
      <div class="score-row" id="scoreRow"></div>
      <div class="step-box">
        <div class="step-label">Қадами аввал</div>
        <div class="step-text" id="resStep"></div>
      </div>
      <div class="ig-profile">
        <div class="ig-avatar-wrap">
          <img src="jannat.jpg" alt="Jannat Abdulloeva">
        </div>
        <div class="ig-info">
          <div class="ig-name">Jannat Abdulloeva</div>
          <div class="ig-bio">Равоншинос · Психолог<br>Ёрии касбӣ барои табдили ботинӣ</div>
          <a href="https://t.me/jannat_abdulloeva_admin" target="_blank" class="ig-follow-btn">Машварат гир →</a>
        </div>
      </div>
      <button class="retry-btn" onclick="resetQuiz()">↺ Боз як бор гузаштан</button>
    </div>
  </div>

</div>

<script>
const QS = [
  { t:"Вақте касе ба ту кам аҳамият медиҳад, ту бештар чӣ ҳис мекунӣ?", o:[{l:"А",x:"Ман фикр мекунам бо ман ягон чиз нодуруст аст"},{l:"Б",x:"Метарсам, ки ӯ аз ман дур мешавад"},{l:"В",x:"Хомӯш мешавам, вале аз дарун ранҷида мемонам"}]},
  { t:"Дар муносибат ту бештар чӣ кор мекунӣ?", o:[{l:"А",x:"Барои нигоҳ доштани одам аз худ мегузарам"},{l:"Б",x:"Мехоҳам ҳама чизро назорат кунам"},{l:"В",x:"Аз дарун метарсам, ки боз ранҷ мебинам"}]},
  { t:"Вақте туро танқид мекунанд, ту бештар:", o:[{l:"А",x:"Худатро паст ҳис мекунӣ"},{l:"Б",x:"Худатро муҳофизат мекунӣ ё хафа мешавӣ"},{l:"В",x:"Дарунат дер боз ором намешавад"}]},
  { t:"Вақте мехоҳӣ кори нав сар кунӣ, дарунат бештар чӣ мегӯяд?", o:[{l:"А",x:"Аз ман намебарояд"},{l:"Б",x:"Ҳоло вақт нест, баъдтар"},{l:"В",x:"Агар накунам, бехатартар аст"}]},
  { t:"Бо пулу даромад ту бештар чӣ ҳис мекунӣ?", o:[{l:"А",x:"Ман ҳоло ба пули зиёд омода нестам"},{l:"Б",x:"Нархи худро гуфтан душвор аст"},{l:"В",x:"Метарсам, ки агар зиёд шавам, маро қабул намекунанд"}]},
  { t:"Вақте касе туро интихоб намекунад, ту бештар чӣ фикр мекунӣ?", o:[{l:"А",x:"Ман кофӣ нестам"},{l:"Б",x:"Маро боз тарк карданд"},{l:"В",x:"Ба касе бовар кардан хатарнок аст"}]},
  { t:"Дар зиндагӣ бештар кадом ҳолат ба ту наздик аст?", o:[{l:"А",x:"Бисёр худро бо дигарон муқоиса мекунам"},{l:"Б",x:"Бисёр ба дигарон бастагӣ пайдо мекунам"},{l:"В",x:"Бисёр шубҳа мекунам ва қадам намемонам"}]},
  { t:"Вақте оромӣ меояд, дарунат чӣ мекунад?", o:[{l:"А",x:"Бовар намекунам, ки ин оромӣ мемонад"},{л:"Б",x:"Интизори мушкил мешавам"},{l:"В",x:"Ҳамоно фикр мекунам, ки чизе намерасад"}]},
  { t:"Барои дӯст дошта шудан, ту бештар:", o:[{l:"А",x:"Худатро исбот мекунӣ"},{l:"Б",x:"Хомӯш мешавӣ ва тоқат мекунӣ"},{l:"В",x:"Қавӣ менамоӣ, то заиф набинанд"}]},
  { t:"Вақте танҳо мемонӣ, бештар чӣ эҳсос меояд?", o:[{l:"А",x:"Холигӣ"},{l:"Б",x:"Тарси тарк шудан"},{l:"В",x:"Фикрҳои бисёр ва изтироб"}]},
  { t:'Вақте бояд "не" гӯӣ, бештар чӣ мешавад?', o:[{l:"А",x:"Метарсам, ки маро бад мебинанд"},{l:"Б",x:"Аз худ мегузарам, то осоиш нигоҳ дорам"},{l:"В",x:"Баъд аз он аз худ меранҷам"}]},
  { t:"Дар кори худ бештар кадом мушкилро дорӣ?", o:[{l:"А",x:"Кашолкорӣ мекунам"},{l:"Б",x:"Ба худ шубҳа дорам"},{l:"В",x:"Метарсам, ки маро танқид мекунанд"}]},
  { t:"Вақте касе ба ту сард мешавад, ту бештар:", o:[{l:"А",x:"Аз пасаш медавӣ ё фикрат банд мешавад"},{l:"Б",x:"Дарунан мешиканӣ, вале нишон намедиҳӣ"},{l:"В",x:"Фикр мекунӣ, ки ту сабаб шудӣ"}]},
  { t:"Даруни ту бештар кадом ҷумла такрор мешавад?", o:[{l:"А",x:"Ман кофӣ нестам"},{l:"Б",x:"Маро тарк мекунанд"},{l:"В",x:"Аз ман намебарояд"}]},
  { t:"Агар рост ба худ нигоҳ кунӣ, бештар кадом чиз зиндагии туро идора мекунад?", o:[{l:"А",x:"Беқадрӣ"},{l:"Б",x:"Тарси гум кардан"},{l:"В",x:"Шубҳа ва тарс аз амал"}]}
];

const RESULTS = {
  А: {
    emoji:"🪞",
    title:'"Ман кофӣ нестам"',
    desc:"Ту бисёр вақт худро аз чашми дигарон мебинӣ. Қадри худро аз берун меҷӯӣ. Аз ҳамин сабаб дар робита, даромад ва ҳолати равонӣ зуд мешиканӣ.",
    step:"Ҳар рӯз навис: Имрӯз дар куҷо худро кам кардам?"
  },
  Б: {
    emoji:"🔗",
    title:'"Маро тарк мекунанд"',
    desc:'Ту аз танҳо мондан, дур шудан ва гум кардани муҳаббат метарсӣ. Аз ҳамин сабаб аз худ мегузарӣ, вобаста мешавӣ ва "не" гуфтан душвор мешавад.',
    step:"Навис: Ман барои нигоҳ доштани кӣ аз худ мегузарам?"
  },
  В: {
    emoji:"🌫️",
    title:'"Аз ман намебарояд"',
    desc:"Даруни ту аз амал, аз хато ва аз дард метарсад. Аз ҳамин сабаб қадам намемонӣ, шубҳа мекунӣ, кашолкорӣ меояд ва оромӣ дер намемонад.",
    step:"Навис: Агар ман аз тарс не, аз эътимод зиндагӣ мекардам, имрӯз чӣ мекардам?"
  }
};

let cur = 0;
let answers = Array(15).fill(null);

function render() {
  const q = QS[cur];
  document.getElementById('qText').textContent = q.t;
  document.getElementById('qCounter').textContent = `${cur + 1} / 15`;
  document.getElementById('progFill').style.width = `${((cur + 1) / 15) * 100}%`;
  const list = document.getElementById('optList');
  list.innerHTML = '';
  q.o.forEach(opt => {
    if (!opt.l) return; // skip malformed
    const label = document.createElement('label');
    label.className = 'opt-label';
    label.innerHTML = `
      <input type="radio" name="q${cur}" value="${opt.l}" ${answers[cur] === opt.l ? 'checked' : ''}>
      <span class="radio-circle"><span class="radio-dot"></span></span>
      <span>${opt.x}</span>
    `;
    label.querySelector('input').addEventListener('change', e => {
      answers[cur] = e.target.value;
      setTimeout(() => nextQ(), 280);
    });
    list.appendChild(label);
  });
}

function nextQ() {
  const sel = document.querySelector(`input[name="q${cur}"]:checked`);
  if (sel) answers[cur] = sel.value;

  if (!answers[cur]) {
    const c = document.getElementById('quizCard');
    c.classList.remove('shake');
    void c.offsetWidth;
    c.classList.add('shake');
    return;
  }
  if (cur < 14) { cur++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  else showResult();
}

function showResult() {
  const cnt = { А:0, Б:0, В:0 };
  answers.forEach(a => { if (a && cnt[a] !== undefined) cnt[a]++; });

  let winner = 'А';
  if (cnt['Б'] > cnt[winner]) winner = 'Б';
  if (cnt['В'] > cnt[winner]) winner = 'В';

  const r = RESULTS[winner];
  document.getElementById('quizCard').style.display = 'none';
  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';

  document.getElementById('resEmoji').textContent = r.emoji;
  document.getElementById('resTitle').textContent = r.title;
  document.getElementById('resDesc').textContent = r.desc;
  document.getElementById('resStep').textContent = r.step;

  const row = document.getElementById('scoreRow');
  row.innerHTML = '';
  ['А','Б','В'].forEach(k => {
    const isW = k === winner;
    row.innerHTML += `
      <div class="score-chip${isW ? ' winner' : ''}">
        <span class="chip-letter">${k}</span>
        <span class="chip-count">${cnt[k]}</span>
      </div>`;
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  cur = 0;
  answers = Array(15).fill(null);
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('quizCard').style.display = 'block';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
